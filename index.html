<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>過去問ジェネレーター</title>
    <link rel="stylesheet" href="style.css">
    <!-- marked.js for Markdown parsing -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- KaTeX for math rendering -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-top">
                <h1>過去問ジェネレーター</h1>
                <div id="auth-container">
                    <button id="login-btn" class="auth-btn">Googleでログイン</button>
                    <div id="user-info" style="display: none;">
                        <img id="user-photo" src="" alt="User">
                        <span id="user-name"></span>
                        <button id="logout-btn" class="text-btn">ログアウト</button>
                    </div>
                </div>
            </div>
            <nav id="main-nav" style="display: none;">
                <button id="nav-home" class="nav-link active">ホーム</button>
                <button id="nav-stats" class="nav-link">学習状況</button>
            </nav>
        </header>

        <main>
            <!-- Home View -->
            <div id="home-view" class="view active">
                <div class="controls">
                <select id="subject-select">
                    <option value="ippan">一般知識</option>
                    <option value="senmon">専門知識</option>
                    <option value="mogi_ippan">一般知識 (模擬試験)</option>
                    <option value="mogi_senmon">専門知識 (模擬試験)</option>
                    <option value="jitsugi1">実技1</option>
                    <option value="jitsugi2">実技2</option>
                </select>
                <div class="button-group">
                    <button id="start-btn">過去問作成 (15問)</button>
                    <button id="simple-test-btn" class="accent-btn">簡易テスト作成</button>
                </div>
            </div>

            <!-- Simple Test Settings Modal -->
            <div id="simple-test-modal" class="modal">
                <div class="modal-container" style="max-width: 450px; height: auto;">
                    <div class="modal-header">
                        <h2>簡易テスト設定</h2>
                        <span class="close-simple-test" style="cursor:pointer; font-size: 1.5rem;">&times;</span>
                    </div>
                    <div class="modal-body" style="padding: 2rem; display: flex; flex-direction: column; gap: 2rem;">
                        <div class="test-settings">
                            <label for="modal-genre-select">ジャンル絞り込み:</label>
                            <select id="modal-genre-select" style="width: 100%;">
                                <option value="all">全範囲</option>
                            </select>
                        </div>
                        <div class="test-settings">
                            <label for="modal-question-count">問題数: <span id="modal-count-display">5</span>問</label>
                            <input type="range" id="modal-question-count" min="1" max="30" value="5" style="width: 100%;">
                        </div>
                        <div id="exclude-law-container" class="test-settings" style="display: none; flex-direction: row; align-items: center; gap: 0.5rem;">
                            <input type="checkbox" id="exclude-law-checkbox" style="width: auto; cursor: pointer; margin: 0;">
                            <label for="exclude-law-checkbox" style="cursor: pointer; font-weight: normal; margin: 0;">法規を除外する (問12〜14)</label>
                        </div>
                        <button id="modal-start-test-btn" class="accent-btn" style="width: 100%; padding: 1rem;">テスト開始</button>
                    </div>
                </div>
            </div>

            <div id="viewer" class="viewer" style="display: none;">
                <div class="viewer-header">
                    <span id="status-text">1 / 15</span>
                    <div id="question-stats" class="stats-badge" style="display: none;">
                        正解率: <span id="success-rate">--</span>% 
                        (<span id="stat-correct">0</span>/<span id="stat-count">0</span>)
                    </div>
                </div>
                
                <div class="img-container">
                    <img id="exam-img" src="" alt="過去問画像">
                </div>
                
                <div class="explanation-section">
                    <div class="result-buttons">
                        <button id="correct-btn" class="result-btn correct">正解</button>
                        <button id="incorrect-btn" class="result-btn incorrect">不正解</button>
                    </div>
                    <button id="open-explanation-btn" class="secondary-btn">解説を見る</button>
                </div>

                <div id="explanation-modal" class="modal explanation-modal">
                    <div class="modal-container">
                        <div class="modal-header">
                            <h2 id="modal-title">解説</h2>
                            <span class="close-explanation">&times;</span>
                        </div>
                        <div id="explanation-content" class="modal-body explanation-content">
                            <!-- 解説テキストがここに表示される -->
                        </div>
                    </div>
                </div>

                <div class="nav-buttons">
                    <button id="prev-btn">前へ</button>
                    <button id="next-btn" class="primary-nav">次へ</button>
                </div>
                <button id="view-results-btn" class="accent-btn" style="width: 100%; margin-top: 1rem; display: none;">回答結果を見る</button>
            </div>
            </div> <!-- /#home-view の閉じタグを追加 -->

            <!-- Stats View (Dashboard) -->
            <div id="stats-view" class="view">
                <div class="dashboard-page">
                    <div class="page-header">
                        <h2>学習状況ダッシュボード</h2>
                        <button id="stats-back-btn" class="secondary-btn small-btn">← ホームに戻る</button>
                    </div>
                    
                    <div class="stats-subject-selector" style="margin-bottom: 1.5rem; display: flex; align-items: center; gap: 0.5rem;">
                        <label for="stats-subject-select" style="font-weight: 600; font-size: 0.9rem;">科目選択:</label>
                        <select id="stats-subject-select" class="small-select" style="padding: 0.5rem 1rem; font-size: 0.9rem;">
                            <option value="ippan">一般知識</option>
                            <option value="senmon">専門知識</option>
                            <option value="mogi_ippan">一般知識 (模擬試験)</option>
                            <option value="mogi_senmon">専門知識 (模擬試験)</option>
                            <option value="jitsugi1">実技1</option>
                            <option value="jitsugi2">実技2</option>
                        </select>
                    </div>
                    
                    <div class="stats-summary">
                        <div class="summary-card">
                            <span class="label">総解答数</span>
                            <span id="total-attempts" class="value">0</span>
                        </div>
                        <div class="summary-card">
                            <span class="label">平均正解率</span>
                            <span id="avg-success-rate" class="value">0</span>%
                        </div>
                    </div>
                    
                    <div id="genre-stats-section" class="genre-stats-section" style="display: none;">
                        <h3>分野別分析</h3>
                        <div id="genre-stats-list" class="genre-stats-list">
                            <!-- 分野別正解率のバーがここに生成される -->
                        </div>
                    </div>
                    
                    <div class="stats-list-header">
                        <div class="sort-controls">
                            <label for="stats-sort-select">並び替え:</label>
                            <select id="stats-sort-select" class="small-select">
                                <option value="rate-asc">不正解率順 (苦手な順)</option>
                                <option value="rate-desc">正解率順 (得意な順)</option>
                                <option value="question">問題順</option>
                            </select>
                        </div>
                        <button id="reset-data-btn" class="danger-btn text-btn">データをリセット</button>
                    </div>
                    
                    <div id="stats-list" class="stats-list">
                        <!-- 統計リストがここに生成される -->
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Test Result Modal -->
    <div id="result-modal" class="modal">
        <div class="modal-container" style="max-width: 500px; height: 80vh;">
            <div class="modal-header">
                <h2>回答結果</h2>
                <span class="close-result" style="cursor:pointer; font-size: 1.5rem;">&times;</span>
            </div>
            <div class="modal-body" style="padding: 1.5rem; display: flex; flex-direction: column; gap: 1.5rem; overflow-y: auto;">
                <div class="result-score-container" style="text-align: center; padding: 1.5rem; background: var(--bg); border-radius: var(--radius); border: 1px solid var(--border);">
                    <span style="font-size: 0.9rem; color: var(--text-muted); display: block;">得点</span>
                    <span id="result-score" style="font-size: 3rem; font-weight: 800; color: var(--primary);">0 / 15</span>
                    <span id="result-percent" style="font-size: 1.2rem; font-weight: 700; display: block; margin-top: 0.5rem; color: var(--text-muted);">0%</span>
                </div>
                
                <div style="font-weight: 600; font-size: 0.95rem;">問題ごとの結果 (クリックで解説を表示)</div>
                <div id="result-list" class="stats-list" style="flex: 1; overflow-y: auto; min-height: 200px;">
                    <!-- 各問題の正誤一覧がここに生成される -->
                </div>
                
                <div style="display: flex; gap: 1rem; flex-shrink: 0;">
                    <button id="result-review-btn" class="secondary-btn" style="flex: 1;">問題を復習する</button>
                    <button id="result-home-btn" class="primary-nav" style="flex: 1;">ホームに戻る</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Fullscreen Modal for Image -->
    <div id="image-modal" class="modal">
        <span class="close-modal">&times;</span>
        <img class="modal-content" id="full-img">
    </div>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, increment, serverTimestamp, collection, getDocs, query, deleteDoc, writeBatch } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Your web app's Firebase configuration
        const firebaseConfig = {
          apiKey: "AIzaSyDgNGO3AsaXYT94uED_u5-D9rymL4JEFAg",
          authDomain: "weather-question-656be.firebaseapp.com",
          projectId: "weather-question-656be",
          storageBucket: "weather-question-656be.firebasestorage.app",
          messagingSenderId: "615941104665",
          appId: "1:615941104665:web:2e2c0fdfe512023b173688",
          measurementId: "G-5GZPJ1F7EM"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        // Export to window for app.js
        window.fb = { auth, db, provider, signInWithPopup, signOut, onAuthStateChanged, doc, getDoc, setDoc, updateDoc, increment, serverTimestamp, collection, getDocs, query, deleteDoc, writeBatch };
    </script>

    <script src="data.js"></script>
    <script src="app.js" type="module"></script>
</body>
</html>
