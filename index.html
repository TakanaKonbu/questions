<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>過去問ジェネレーター</title>
    <link rel="stylesheet" href="style.css">
    <!-- marked.js for Markdown parsing -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- KaTeX for math rendering -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>過去問ジェネレーター</h1>
            <div class="data-source">
                <button id="update-data-btn" class="secondary-btn">データフォルダを読み込む / 更新</button>
                <input type="file" id="folder-input" webkitdirectory directory multiple style="display: none;">
                <p id="data-status-text">データが読み込まれていません。</p>
            </div>
        </header>

        <main>
            <div class="controls">
                <select id="subject-select">
                    <option value="ippan">一般知識</option>
                    <option value="senmon">専門知識</option>
                    <option value="jitsugi1">実技1</option>
                    <option value="jitsugi2">実技2</option>
                </select>
                <div class="test-settings">
                    <label for="question-count">問題数: <span id="count-display">5</span>問</label>
                    <input type="range" id="question-count" min="1" max="30" value="5">
                </div>
                <div class="button-group">
                    <button id="start-btn">過去問作成 (15問)</button>
                    <button id="simple-test-btn" class="accent-btn">簡易テスト作成</button>
                </div>
            </div>

            <div id="viewer" class="viewer" style="display: none;">
                <div class="viewer-header">
                    <span id="status-text">1 / 15</span>
                </div>
                
                <div class="img-container">
                    <img id="exam-img" src="" alt="過去問画像">
                </div>
                
                <div class="explanation-section">
                    <button id="open-explanation-btn" class="secondary-btn">解説を見る</button>
                </div>

                <div id="explanation-modal" class="modal explanation-modal">
                    <div class="modal-container">
                        <div class="modal-header">
                            <h2 id="modal-title">解説</h2>
                            <span class="close-explanation">&times;</span>
                        </div>
                        <div id="explanation-content" class="modal-body explanation-content">
                            <!-- 解説テキストがここに表示される -->
                        </div>
                    </div>
                </div>

                <div class="nav-buttons">
                    <button id="prev-btn">前へ</button>
                    <button id="next-btn" class="primary-nav">次へ</button>
                </div>
            </div>
        </main>
    </div>

    <!-- Fullscreen Modal for Image -->
    <div id="image-modal" class="modal">
        <span class="close-modal">&times;</span>
        <img class="modal-content" id="full-img">
    </div>

    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
